<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4; padding: 20px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    
                    <!-- Header with Background Image -->
                    <tr>
                        <td style="background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1200'); background-size: cover; background-position: center; padding: 60px 30px; text-align: center; position: relative;">
                            <div style="background-color: rgba(3, 23, 39, 0.85); padding: 20px; border-radius: 8px;">
                                <h1 style="margin: 0; color: #ffffff; font-size: 24px;">New Contact Form Message</h1>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding: 30px;">
                            <p style="margin: 0 0 20px 0; color: #333333; font-size: 15px;">
                                Hello,
                            </p>
                            <p style="margin: 0 0 25px 0; color: #333333; font-size: 15px;">
                                You have received a new message from your website:
                            </p>
                            
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 20px;">
                                <tr>
                                    <td style="padding: 12px; background-color: #f8f9fa; border-left: 3px solid #36C4B7;">
                                        <strong style="color: #666;">Name:</strong><br>
                                        <span style="color: #333;">{{from_name}}</span>
                                    </td>
                                </tr>
                            </table>
                            
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 20px;">
                                <tr>
                                    <td style="padding: 12px; background-color: #f8f9fa; border-left: 3px solid #36C4B7;">
                                        <strong style="color: #666;">Email:</strong><br>
                                        <a href="mailto:{{from_email}}" style="color: #36C4B7; text-decoration: none;">{{from_email}}</a>
                                    </td>
                                </tr>
                            </table>
                            
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 20px;">
                                <tr>
                                    <td style="padding: 12px; background-color: #f8f9fa; border-left: 3px solid #36C4B7;">
                                        <strong style="color: #666;">Phone:</strong><br>
                                        <span style="color: #333;">{{phone}}</span>
                                    </td>
                                </tr>
                            </table>
                            
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 20px;">
                                <tr>
                                    <td style="padding: 12px; background-color: #f8f9fa; border-left: 3px solid #36C4B7;">
                                        <strong style="color: #666;">Company:</strong><br>
                                        <span style="color: #333;">{{company}}</span>
                                    </td>
                                </tr>
                            </table>
                            
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 25px;">
                                <tr>
                                    <td style="padding: 15px; background-color: #f8f9fa; border-left: 3px solid #FD5765;">
                                        <strong style="color: #666;">Message:</strong><br><br>
                                        <span style="color: #333; white-space: pre-wrap;">{{message}}</span>
                                    </td>
                                </tr>
                            </table>
                            
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="center" style="padding-top: 10px;">
                                        <a href="mailto:{{from_email}}" style="display: inline-block; padding: 12px 30px; background-color: #36C4B7; color: #ffffff; text-decoration: none; border-radius: 5px; font-size: 14px;">
                                            Reply to {{from_name}}
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 20px; background-color: #f8f9fa; text-align: center; border-top: 1px solid #e0e0e0;">
                            <p style="margin: 0; color: #666666; font-size: 13px;">
                                Scientist Technologies<br>
                                <span style="color: #999999; font-size: 12px;">Sent from your website contact form</span>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
